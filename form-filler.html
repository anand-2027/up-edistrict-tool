<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Declaration Form Filler</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        #form-workspace { position: relative; display: inline-block; border: 1px solid #ccc; margin-top: 10px; }
        #base-image { max-width: 100%; display: block; }
        .typing-input { position: absolute; background: transparent; border: 1px dashed #ff7619; font-size: 16px; z-index: 10; }
        .sig-overlay { position: absolute; max-width: 100px; cursor: move; z-index: 20; border: 1px dashed #ccc; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html">← Back to Dashboard</a>
    <h2>Smart Declaration Form Filler</h2>
    <div class="controls">
        <input type="file" id="formUpload" accept="image/*">
        <input type="file" id="sigUpload" accept="image/*" title="Add Signature">
        <button id="btnDownload">Generate JPG</button>
    </div>
    <div id="form-workspace"><img id="base-image" src=""></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const workspace = document.getElementById('form-workspace');
    const baseImg = document.getElementById('base-image');

    document.getElementById('formUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { baseImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    workspace.onclick = (e) => {
        if (e.target !== baseImg && e.target !== workspace) return;
        const input = document.createElement('input');
        input.className = 'typing-input';
        input.style.left = e.offsetX + 'px';
        input.style.top = e.offsetY + 'px';
        workspace.appendChild(input);
        input.focus();
    };

    document.getElementById('sigUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'sig-overlay';
            img.style.left = '50px'; img.style.top = '50px';
            img.onmousedown = (e) => {
                const move = (ev) => { img.style.left = ev.clientX - 50 + 'px'; img.style.top = ev.clientY - 150 + 'px'; };
                document.onmousemove = move;
                document.onmouseup = () => document.onmousemove = null;
            };
            workspace.appendChild(img);
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('btnDownload').onclick = () => {
        html2canvas(workspace).then(canvas => {
            const link = document.createElement('a');
            link.download = 'filled_form.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    };
</script>
</body>
</html>
