<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Smart Cutter — Anand e-Solutions</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back-link">← Dashboard</a>

  <div class="masthead">
    <span class="eyebrow">e-Aadhaar Unlock &amp; Crop</span>
    <h1>Aadhaar Smart Cutter</h1>
    <p>Unlock your e-Aadhaar PDF, crop both sides, and print them on one A4 sheet</p>
  </div>

  <div class="card">
    <div id="uploadSection">
      <div class="input-group">
        <label>1 · e-Aadhaar password (first 4 letters of name in CAPS + year of birth, e.g. SURE1990)</label>
        <input type="password" id="pdfPassword" placeholder="e.g. SURE1990">
      </div>
      <div class="input-group">
        <label>2 · Upload e-Aadhaar PDF</label>
        <input type="file" id="pdfInput" accept="application/pdf">
      </div>
      <button class="btn-action btn-compress-doc" id="btnLoadPdf" style="display:block;">🔓 Unlock &amp; Extract PDF</button>
      <p id="loader">Reading PDF…</p>
      <p id="pdfError" style="display:none; color:var(--stamp); text-align:center; font-weight:600; font-size:13.5px; margin-top:8px;"></p>
    </div>

    <div class="tool-panel" id="workspace">
      <p class="hint-banner" id="instructionText">Step 1: Crop the FRONT side and save.</p>
      <div class="image-container"><img id="sourceImage" src="" alt="Aadhaar page"></div>
      <div class="btn-group">
        <button class="btn-action btn-front" id="btnFront" style="display:block;">✂️ Save Front Side</button>
        <button class="btn-action btn-back" id="btnBack" style="display:block;" disabled>✂️ Save Back Side</button>
      </div>
    </div>

    <div class="result-box" id="previewArea">
      <div class="stamp">READY<br>TO PRINT</div>
      <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
        <div>
          <p style="font-weight:600; font-size:13px; color:var(--ink-soft); margin:0 0 6px;">Front</p>
          <img id="frontPreview" style="width:230px; max-width:100%; border:1px solid var(--line); border-radius:6px;">
        </div>
        <div>
          <p style="font-weight:600; font-size:13px; color:var(--ink-soft); margin:0 0 6px;">Back</p>
          <img id="backPreview" style="width:230px; max-width:100%; border:1px solid var(--line); border-radius:6px;">
        </div>
      </div>
      <button class="btn-action btn-download" id="btnDownload" style="display:block;">📄 Download A4 Print PDF</button>
    </div>
  </div>

  <p class="footer-note">YOUR PDF PASSWORD IS USED ONLY IN THE BROWSER · NEVER SENT ANYWHERE</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  let cropper, frontImgData, backImgData;
  const CARD_ASPECT_RATIO = 85.6 / 54;

  document.getElementById('btnLoadPdf').addEventListener('click', () => {
    const file = document.getElementById('pdfInput').files[0];
    const pass = document.getElementById('pdfPassword').value;
    const errorEl = document.getElementById('pdfError');
    errorEl.style.display = 'none';

    if (!file || !pass) {
      errorEl.textContent = 'Please choose a PDF and enter its password.';
      errorEl.style.display = 'block';
      return;
    }

    document.getElementById('loader').classList.add('show');
    document.getElementById('btnLoadPdf').disabled = true;

    const reader = new FileReader();
    reader.onload = function () {
      pdfjsLib.getDocument({ data: new Uint8Array(this.result), password: pass }).promise.then(pdf => {
        pdf.getPage(1).then(page => {
          const viewport = page.getViewport({ scale: 2.5 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
            document.getElementById('sourceImage').src = canvas.toDataURL('image/jpeg', 1.0);
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('workspace').classList.add('active');
            document.getElementById('loader').classList.remove('show');
            cropper = new Cropper(document.getElementById('sourceImage'), {
              aspectRatio: CARD_ASPECT_RATIO, viewMode: 1, autoCropArea: 0.2
            });
          });
        });
      }).catch(e => {
        document.getElementById('loader').classList.remove('show');
        document.getElementById('btnLoadPdf').disabled = false;
        errorEl.textContent = e.name === 'PasswordException' ? 'Incorrect password. Please try again.' : 'Could not read this PDF. Please check the file.';
        errorEl.style.display = 'block';
      });
    };
    reader.readAsArrayBuffer(file);
  });

  document.getElementById('btnFront').addEventListener('click', () => {
    if (!cropper) return;
    frontImgData = cropper.getCroppedCanvas({ width: 856, height: 540 }).toDataURL('image/jpeg', 1.0);
    document.getElementById('frontPreview').src = frontImgData;
    document.getElementById('btnFront').disabled = true;
    document.getElementById('btnBack').disabled = false;
    document.getElementById('instructionText').innerText = 'Step 2: Crop the BACK side and save.';
    cropper.reset();
  });

  document.getElementById('btnBack').addEventListener('click', () => {
    if (!cropper) return;
    backImgData = cropper.getCroppedCanvas({ width: 856, height: 540 }).toDataURL('image/jpeg', 1.0);
    document.getElementById('backPreview').src = backImgData;
    document.getElementById('btnBack').disabled = true;
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('instructionText').innerText = 'Done! Download your print-ready PDF below.';
  });

  document.getElementById('btnDownload').addEventListener('click', () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const w = 85.6, h = 54.0, x = (210 - w) / 2;
    pdf.addImage(frontImgData, 'JPEG', x, 20, w, h);
    pdf.addImage(backImgData, 'JPEG', x, 84, w, h);
    pdf.setLineWidth(0.2);
    pdf.rect(x, 20, w, h);
    pdf.rect(x, 84, w, h);
    pdf.save('Aadhaar_Print.pdf');
  });
</script>
</body>
</html>
